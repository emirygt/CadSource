<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAD Arama — Giriş</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117; color: #e6edf3;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 2rem; width: 100%; max-width: 400px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  p.sub { color: #8b949e; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #30363d; }
  .tab {
    padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.9rem;
    color: #8b949e; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 0.4rem; }
  input {
    width: 100%; padding: 0.6rem 0.8rem;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e6edf3; font-size: 0.95rem; outline: none;
  }
  input:focus { border-color: #58a6ff; }
  button.primary {
    width: 100%; padding: 0.7rem;
    background: #238636; border: 1px solid #2ea043; border-radius: 6px;
    color: #fff; font-size: 0.95rem; cursor: pointer; font-weight: 600;
    margin-top: 0.5rem;
  }
  button.primary:hover { background: #2ea043; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #f85149; font-size: 0.85rem; margin-top: 0.8rem; }
  .success { color: #3fb950; font-size: 0.85rem; margin-top: 0.8rem; }
</style>
</head>
<body>
<div class="card">
  <h1>CAD Arama Motoru</h1>
  <p class="sub">DWG/DXF dosyalarınızda benzerlik araması</p>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="showTab('login')">Giriş Yap</div>
    <div class="tab" id="tab-register" onclick="showTab('register')">Kayıt Ol</div>
  </div>

  <!-- Giriş Formu -->
  <div id="form-login">
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="login-email" placeholder="ali@sirket.com">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="primary" id="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div id="login-msg"></div>
  </div>

  <!-- Kayıt Formu -->
  <div id="form-register" style="display:none">
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="reg-email" placeholder="ali@sirket.com">
    </div>
    <div class="form-group">
      <label>Şirket Adı (isteğe bağlı)</label>
      <input type="text" id="reg-company" placeholder="Acme Mühendislik">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="reg-password" placeholder="En az 6 karakter">
    </div>
    <button class="primary" id="btn-register" onclick="doRegister()">Kayıt Ol</button>
    <div id="register-msg"></div>
  </div>
</div>

<script>
const API = window.API_URL || '/api';

function showTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').className = 'tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'tab' + (tab === 'register' ? ' active' : '');
}

async function doLogin() {
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('login-msg');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) { msg.className = 'error'; msg.textContent = 'Email ve şifre gerekli'; return; }

  btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Giriş başarısız');
    localStorage.setItem('token', data.token);
    localStorage.setItem('email', data.email);
    window.location.href = 'index.html';
  } catch (e) {
    msg.className = 'error'; msg.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Giriş Yap';
  }
}

async function doRegister() {
  const btn = document.getElementById('btn-register');
  const msg = document.getElementById('register-msg');
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const company_name = document.getElementById('reg-company').value.trim();

  if (!email || !password) { msg.className = 'error'; msg.textContent = 'Email ve şifre gerekli'; return; }
  if (password.length < 6) { msg.className = 'error'; msg.textContent = 'Şifre en az 6 karakter olmalı'; return; }

  btn.disabled = true; btn.textContent = 'Kayıt yapılıyor...';
  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, company_name }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Kayıt başarısız');
    localStorage.setItem('token', data.token);
    localStorage.setItem('email', data.email);
    window.location.href = 'upload.html';
  } catch (e) {
    msg.className = 'error'; msg.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Kayıt Ol';
  }
}

// Zaten giriş yapıldıysa ana sayfaya yönlendir
if (localStorage.getItem('token')) window.location.href = 'index.html';
</script>
</body>
</html>
