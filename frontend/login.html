<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAD Arama — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: #f1f5f9; color: #1e293b;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-heading);
    letter-spacing: -0.01em;
  }
  code, pre, .mono {
    font-family: var(--font-mono);
  }
  .card {
    background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px;
    padding: 2rem; width: 100%; max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; color: #1e293b; }
  p.sub { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #e2e8f0; }
  .tab {
    padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.9rem;
    color: #94a3b8; border-bottom: 2px solid transparent; margin-bottom: -1px;
    font-weight: 500;
  }
  .tab.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 0.4rem; }
  input {
    width: 100%; padding: 0.6rem 0.8rem;
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    color: #1e293b; font-size: 0.95rem; outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
  button.primary {
    width: 100%; padding: 0.7rem;
    background: #0ea5e9; border: none; border-radius: 8px;
    color: #fff; font-size: 0.95rem; cursor: pointer; font-weight: 600;
    margin-top: 0.5rem;
    transition: background 0.15s;
  }
  button.primary:hover { background: #0284c7; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.8rem; }
  .success { color: #10b981; font-size: 0.85rem; margin-top: 0.8rem; }
</style>
</head>
<body>
<div class="card">
  <h1>CAD Arama Motoru</h1>
  <p class="sub">DWG/DXF dosyalarınızda benzerlik araması</p>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="showTab('login')">Giriş Yap</div>
    <div class="tab" id="tab-register" onclick="showTab('register')">Kayıt Ol</div>
  </div>

  <!-- Giriş Formu -->
  <div id="form-login">
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="login-email" placeholder="ali@sirket.com">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="primary" id="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div id="login-msg"></div>
  </div>

  <!-- Kayıt Formu -->
  <div id="form-register" style="display:none">
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="reg-email" placeholder="ali@sirket.com">
    </div>
    <div class="form-group">
      <label>Şirket Adı (isteğe bağlı)</label>
      <input type="text" id="reg-company" placeholder="Acme Mühendislik">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="reg-password" placeholder="En az 6 karakter">
    </div>
    <button class="primary" id="btn-register" onclick="doRegister()">Kayıt Ol</button>
    <div id="register-msg"></div>
  </div>
</div>

<script>
const API_CANDIDATES = (() => {
  const list = [];
  if (window.API_URL) list.push(window.API_URL);
  const saved = localStorage.getItem('api_base');
  if (saved) list.push(saved);
  list.push('/api');
  if (['localhost', '127.0.0.1', '::1', '[::1]'].includes(window.location.hostname)) {
    list.push('http://127.0.0.1:8000');
    list.push('http://localhost:8000');
    list.push('http://[::1]:8000');
  } else {
    list.push(`${window.location.protocol}//${window.location.hostname}:8000`);
  }
  return [...new Set(list)];
})();

let API = API_CANDIDATES[0];
let API_READY = false;

async function ensureApiBase() {
  if (API_READY) return API;
  for (const base of API_CANDIDATES) {
    try {
      const res = await fetch(`${base}/health`, { cache: 'no-store' });
      const text = (await res.text()).trim();
      if (res.ok && text.startsWith('{')) {
        API = base;
        API_READY = true;
        localStorage.setItem('api_base', API);
        return API;
      }
    } catch (_) {}
  }
  API = API_CANDIDATES[0] || '/api';
  API_READY = true;
  return API;
}

async function parseJsonResponse(res, failPrefix) {
  const body = await res.text();
  let data = null;
  if (body) {
    try {
      data = JSON.parse(body);
    } catch (_) {
      if (body.trim().startsWith('<')) {
        throw new Error(
          `${failPrefix}: API yerine HTML döndü. Nginx'te /api proxy backend'e gitmiyor olabilir veya backend kapalı.`
        );
      }
      throw new Error(`${failPrefix}: API JSON dönmedi (HTTP ${res.status})`);
    }
  }

  if (!res.ok) {
    const detail = data && data.detail ? data.detail : `${failPrefix} (HTTP ${res.status})`;
    throw new Error(detail);
  }
  return data || {};
}

function showTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').className = 'tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'tab' + (tab === 'register' ? ' active' : '');
}

async function doLogin() {
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('login-msg');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) { msg.className = 'error'; msg.textContent = 'Email ve şifre gerekli'; return; }

  btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
  try {
    await ensureApiBase();
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await parseJsonResponse(res, 'Giriş başarısız');
    localStorage.setItem('token', data.token);
    localStorage.setItem('email', data.email);
    window.location.href = 'index.html';
  } catch (e) {
    msg.className = 'error'; msg.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Giriş Yap';
  }
}

async function doRegister() {
  const btn = document.getElementById('btn-register');
  const msg = document.getElementById('register-msg');
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const company_name = document.getElementById('reg-company').value.trim();

  if (!email || !password) { msg.className = 'error'; msg.textContent = 'Email ve şifre gerekli'; return; }
  if (password.length < 6) { msg.className = 'error'; msg.textContent = 'Şifre en az 6 karakter olmalı'; return; }

  btn.disabled = true; btn.textContent = 'Kayıt yapılıyor...';
  try {
    await ensureApiBase();
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, company_name }),
    });
    const data = await parseJsonResponse(res, 'Kayıt başarısız');
    localStorage.setItem('token', data.token);
    localStorage.setItem('email', data.email);
    window.location.href = 'index.html';
  } catch (e) {
    msg.className = 'error'; msg.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Kayıt Ol';
  }
}

// Zaten giriş yapıldıysa ana sayfaya yönlendir
if (localStorage.getItem('token')) window.location.href = 'index.html';
</script>
</body>
</html>
