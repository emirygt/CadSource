<div class="page" id="page-duplicates" style="padding:0; background:#f8fafc; align-items: stretch; flex-direction: column;">
  <div class="page-header">
    <div>
      <h1 class="ph-title">Duplicate Yönetimi</h1>
      <p class="ph-sub">Tam kopyaları ve revizyon adaylarını yönetin</p>
    </div>
    <div class="ph-actions">
      <span class="enterprise-badge">Enterprise</span>
    </div>
  </div>
  <!-- Filter bar -->
  <div style="padding:12px 32px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:#475569">Filtrele:</span>
    <button id="dupFilterAll" onclick="setDupFilter('')" class="dup-filter-btn active" style="padding:5px 12px;border:1px solid #e2e8f0;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:#0ea5e9;color:#fff">Tümü</button>
    <button id="dupFilterExact" onclick="setDupFilter('exact_duplicate')" class="dup-filter-btn" style="padding:5px 12px;border:1px solid #e2e8f0;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:#475569">Tam Kopya</button>
    <button id="dupFilterRevision" onclick="setDupFilter('revision_candidate')" class="dup-filter-btn" style="padding:5px 12px;border:1px solid #e2e8f0;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:#475569">Revizyon Adayı</button>
    <span id="dupSelectInfo" style="font-size:12px;color:#64748b;margin-left:auto"></span>
    <button class="analytics-primary-btn" id="dupMergeBtn" onclick="duplicateMergeSelected()" disabled style="opacity:0.5;height:34px;font-size:12px">
      <span class="btn-ic"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m10 0h3a2 2 0 0 0 2-2v-3"/></svg></span>
      Revizyon Grubu Oluştur
    </button>
  </div>
  <!-- Content -->
  <div style="flex:1;overflow-y:auto;padding:24px 32px">
    <div id="dupGroupsContainer" style="display:flex;flex-direction:column;gap:16px">
      <div style="text-align:center;padding:40px;color:#94a3b8">Yükleniyor...</div>
    </div>
    <div style="display:flex;justify-content:center;gap:8px;margin-top:20px" id="dupPagination" style="display:none">
      <button class="pg-btn" id="dupPrevBtn" onclick="dupChangePage(-1)">‹ Önceki</button>
      <span id="dupPageInfo" style="font-size:13px;color:#64748b;padding:6px 12px"></span>
      <button class="pg-btn" id="dupNextBtn" onclick="dupChangePage(1)">Sonraki ›</button>
    </div>
  </div>
  <!-- File selection for merge -->
  <div id="dupSelectedFiles" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;display:flex;align-items:center;gap:12px;z-index:500"></div>
</div>
