<div class="page" id="page-nl-search" style="padding:0; background:#f8fafc; align-items: stretch; flex-direction: column;">
  <div class="page-header">
    <div>
      <h1 class="ph-title" data-i18n="nl_search.title">Özellik ile Ara</h1>
      <p class="ph-sub" data-i18n="nl_search.sub">Ürünleri özelliklerine göre filtreleyin</p>
    </div>
  </div>
  <div style="padding:24px 32px; max-width:1200px; width:100%; margin:0 auto; display:flex; flex-direction:column; gap:20px;">

    <!-- Filter Panel -->
    <div class="cat-add-card" style="padding:20px 24px">
      <!-- Built-in filters -->
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px 20px; margin-bottom:16px">

        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase" data-i18n="attr_search.category">Kategori</label>
          <select id="asFilterCat" style="font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;outline:none;color:#0f172a">
            <option value="" data-i18n="attr_search.all">Tümü</option>
          </select>
        </div>

        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase" data-i18n="attr_search.format">Format</label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:4px">
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="as-fmt-chk" value="dwg" style="accent-color:#6366f1"> DWG</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="as-fmt-chk" value="dxf" style="accent-color:#6366f1"> DXF</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="as-fmt-chk" value="pdf" style="accent-color:#6366f1"> PDF</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="as-fmt-chk" value="jpg" style="accent-color:#6366f1"> JPG</label>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase" data-i18n="attr_search.entity_count">Entity Sayısı</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input id="asEntityMin" type="number" min="0" placeholder="Min" style="width:80px;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:7px;outline:none">
            <span style="color:#94a3b8;font-size:12px">—</span>
            <input id="asEntityMax" type="number" min="0" placeholder="Max" style="width:80px;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:7px;outline:none">
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase" data-i18n="attr_search.width_mm">Genişlik (mm)</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input id="asBwMin" type="number" min="0" placeholder="Min" style="width:80px;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:7px;outline:none">
            <span style="color:#94a3b8;font-size:12px">—</span>
            <input id="asBwMax" type="number" min="0" placeholder="Max" style="width:80px;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:7px;outline:none">
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase" data-i18n="attr_search.height_mm">Yükseklik (mm)</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input id="asBhMin" type="number" min="0" placeholder="Min" style="width:80px;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:7px;outline:none">
            <span style="color:#94a3b8;font-size:12px">—</span>
            <input id="asBhMax" type="number" min="0" placeholder="Max" style="width:80px;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:7px;outline:none">
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase" data-i18n="attr_search.layer">Katman</label>
          <input id="asLayer" type="text" placeholder="Katman adı..." style="font-family:inherit;font-size:12px;padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;outline:none">
        </div>

      </div>

      <!-- Custom attribute filters (dynamic) -->
      <div id="asCustomFilters" style="display:none;margin-top:4px;padding-top:16px;border-top:1px solid #f1f5f9">
        <div style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px" data-i18n="attr_search.custom">Özel Alanlar</div>
        <div id="asCustomFilterGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px 20px"></div>
      </div>

      <!-- Action buttons -->
      <div style="display:flex;gap:10px;margin-top:18px;align-items:center">
        <button class="btn-primary" onclick="runAttrSearch(1)" data-i18n="attr_search.btn" style="min-width:90px">Ara</button>
        <button onclick="resetAttrSearch()" style="font-size:12px;color:#dc2626;background:none;border:none;cursor:pointer;padding:4px 8px" data-i18n="attr_search.reset">Temizle</button>
        <span id="asResultCount" style="font-size:12px;color:#64748b;margin-left:4px"></span>
      </div>
    </div>

    <!-- Results -->
    <div id="nlResultsArea"></div>
  </div>
</div>
