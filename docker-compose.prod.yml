version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cad_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cad_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@postgres:5432/cad_search
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
    volumes:
      - upload_data:/app/uploads
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.prod
    container_name: cad_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"
    networks:
      - internal

volumes:
  postgres_data:
  upload_data:

networks:
  internal:
    driver: bridge
