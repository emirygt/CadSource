server {
    listen 80;
    server_name _;

    # Bulk upload icin limit
    client_max_body_size 100M;

    # Bu path deploy script tarafindan dinamik replace edilir.
    # Elle kullaniyorsaniz kendi repo yolunuza gore guncelleyin.
    root __PROJECT_ROOT__/frontend;
    index login.html index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api prefix'ini strip edip backend'e ilet
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
